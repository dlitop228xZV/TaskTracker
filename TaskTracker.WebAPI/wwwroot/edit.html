<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Task Tracker — Edit</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="/index.html" aria-label="Task Tracker">
        <span class="brand-badge">TT</span>
        <span>Task Tracker</span>
      </a>
      <nav class="site-nav" aria-label="Навигация">
        <a class="nav-link" href="/index.html">Задачи</a>
        <a class="nav-link" href="/reports.html">Отчёты</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <div class="card-header">
        <h1 class="card-title">Редактирование задачи</h1>
        <p class="card-subtitle">Откройте страницу как /edit.html?id=123</p>
      </div>
      <div class="card-body">
        <div id="editPageError" class="error" style="display:none"></div>

        <form id="editPageForm">
          <input type="hidden" id="taskId" />
          <div class="field">
            <label for="pTitle">Title *</label>
            <input id="pTitle" type="text" minlength="3" maxlength="200" required />
          </div>
          <div class="field">
            <label for="pDescription">Description</label>
            <textarea id="pDescription"></textarea>
          </div>
          <div class="inline">
            <div class="field">
              <label for="pAssigneeId">Assignee</label>
              <select id="pAssigneeId"></select>
            </div>
            <div class="field">
              <label for="pDueDate">DueDate</label>
              <input id="pDueDate" type="date" />
            </div>
          </div>
          <div class="inline">
            <div class="field">
              <label for="pPriority">Priority</label>
              <select id="pPriority">
                <option value="1">Low</option>
                <option value="2">Medium</option>
                <option value="3">High</option>
              </select>
            </div>
            <div class="field">
              <label for="pStatus">Status</label>
              <select id="pStatus">
                <option value="1">New</option>
                <option value="2">InProgress</option>
                <option value="3">Done</option>
              </select>
            </div>
          </div>
          <div class="field">
            <label for="pTagIds">Tags (multiple)</label>
            <select id="pTagIds" multiple size="4"></select>
          </div>

          <div class="actions">
            <button class="btn-primary" type="submit">Сохранить</button>
            <a class="btn-ghost" href="/index.html" role="button" style="display:inline-flex;align-items:center;justify-content:center;padding:10px 12px;border-radius:12px;border:1px solid var(--border)">Отмена</a>
          </div>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <span>Task Tracker • Edit page</span>
    </div>
  </footer>

  <script type="module" src="/js/edit-page.js"></script>
</body>
</html>
